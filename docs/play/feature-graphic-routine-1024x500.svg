<svg width="1024" height="500" viewBox="0 0 1024 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#062A4B"/>
      <stop offset="1" stop-color="#0B3B66"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#EEF5FF" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00B4D8"/>
      <stop offset="1" stop-color="#2A9D8F"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>

  <circle cx="890" cy="90" r="110" fill="#3AAED8" fill-opacity="0.24" filter="url(#soft)"/>
  <circle cx="770" cy="430" r="120" fill="#64DFDF" fill-opacity="0.20" filter="url(#soft)"/>
  <circle cx="200" cy="430" r="90" fill="#54A0FF" fill-opacity="0.18" filter="url(#soft)"/>

  <rect x="66" y="64" width="500" height="372" rx="28" fill="url(#panel)" filter="url(#cardShadow)"/>
  <rect x="66" y="64" width="500" height="372" rx="28" stroke="#D6E6F8"/>

  <text x="102" y="142" fill="#0B3B66" font-size="62" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Routine</text>
  <text x="102" y="188" fill="#335B7D" font-size="25" font-family="Segoe UI, Arial, sans-serif" font-weight="500">
    Agenda, rotina e lembretes
  </text>
  <text x="102" y="223" fill="#4E7492" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="500">
    organizados em um so lugar
  </text>

  <g transform="translate(102 260)">
    <rect width="204" height="44" rx="14" fill="url(#cta)"/>
    <text x="102" y="28" text-anchor="middle" fill="#FFFFFF" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
      Sem anuncios
    </text>
  </g>

  <g transform="translate(320 260)">
    <rect width="210" height="44" rx="14" fill="#E9F4FF"/>
    <text x="105" y="28" text-anchor="middle" fill="#0B3B66" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
      Foco em produtividade
    </text>
  </g>

  <g transform="translate(660 52)">
    <rect x="0" y="0" width="300" height="396" rx="36" fill="#0A2238" filter="url(#cardShadow)"/>
    <rect x="10" y="10" width="280" height="376" rx="30" fill="#F4F8FF"/>

    <rect x="34" y="44" width="160" height="16" rx="8" fill="#0B3B66"/>
    <rect x="34" y="70" width="226" height="10" rx="5" fill="#8AA8C0"/>

    <rect x="34" y="104" width="232" height="72" rx="16" fill="#FFFFFF" stroke="#D9E7F5"/>
    <circle cx="55" cy="126" r="8" fill="#00B4D8"/>
    <rect x="72" y="118" width="122" height="10" rx="5" fill="#1D4F73"/>
    <rect x="72" y="136" width="85" height="8" rx="4" fill="#89A7BE"/>
    <rect x="72" y="151" width="105" height="8" rx="4" fill="#9AB5CA"/>

    <rect x="34" y="188" width="232" height="72" rx="16" fill="#FFFFFF" stroke="#D9E7F5"/>
    <circle cx="55" cy="210" r="8" fill="#2A9D8F"/>
    <rect x="72" y="202" width="145" height="10" rx="5" fill="#1D4F73"/>
    <rect x="72" y="220" width="100" height="8" rx="4" fill="#89A7BE"/>
    <rect x="72" y="235" width="118" height="8" rx="4" fill="#9AB5CA"/>

    <rect x="34" y="272" width="232" height="72" rx="16" fill="#FFFFFF" stroke="#D9E7F5"/>
    <circle cx="55" cy="294" r="8" fill="#FFB703"/>
    <rect x="72" y="286" width="128" height="10" rx="5" fill="#1D4F73"/>
    <rect x="72" y="304" width="94" height="8" rx="4" fill="#89A7BE"/>
    <rect x="72" y="319" width="112" height="8" rx="4" fill="#9AB5CA"/>
  </g>
</svg>
